# Salin ke /etc/nginx/sites-available/noblessegroup.id lalu:
#   sudo ln -s /etc/nginx/sites-available/noblessegroup.id /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Setup: Cloudflare SSL/TLS mode "Flexible" (pengunjung<->Cloudflare HTTPS,
# Cloudflare<->origin tetap HTTP). DNS A record noblessegroup.id -> IP VPS,
# proxied (awan oranye). Nginx di sini TIDAK perlu sertifikat apapun.
# Port app (3003) hanya diakses Nginx secara lokal, tidak dibuka ke publik.

server {
	listen 80;
	server_name noblessegroup.id www.noblessegroup.id;

	client_max_body_size 6M;   # cukup untuk upload gambar (maks 5MB)

	# adapter-node hanya menyajikan static assets dari build/client/ (hasil
	# build), bukan dari static/ asli — jadi file upload baru (ditulis ke
	# static/uploads/ oleh api/admin/upload) tidak akan ketemu lewat Node.
	# Serve langsung dari filesystem di sini, bypass Node.
	# Sesuaikan path /var/www/noblesse-web dengan lokasi project di VPS.
	location /uploads/ {
		alias /var/www/noblesse-web/static/uploads/;
	}

	location / {
		proxy_pass http://127.0.0.1:3003;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		# Flexible mode: Cloudflare->origin selalu HTTP. Skema publik (https)
		# ditentukan lewat ORIGIN di .env, bukan dari header ini.
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
}
